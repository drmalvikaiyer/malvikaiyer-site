# Netlify config. The site is generated from content/*.json by build.py.
[build]
  command = "python3 build.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
